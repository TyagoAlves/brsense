# Firewall Corporativo FreeBSD - Regras PF
ext_if = "ena0"

set block-policy drop
set loginterface $ext_if
set skip on lo0

# NAT corporativo
nat on $ext_if from 10.0.0.0/8 to any -> ($ext_if)
nat on $ext_if from 172.16.0.0/12 to any -> ($ext_if)
nat on $ext_if from 192.168.0.0/16 to any -> ($ext_if)

# SSH - pass quick para garantir acesso remoto
pass in quick on $ext_if inet proto tcp to port 22 keep state

# Liberacao seletiva - saida
pass out proto tcp to port { 22, 80, 443, 53 } keep state
pass out proto udp to port { 53, 123 } keep state
pass out proto icmp all keep state

# Bloqueio total de entrada
block in log all
